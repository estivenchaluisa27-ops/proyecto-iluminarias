services:
  - type: web
    name: iluminarias-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        value: iluminariasuce
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SENTRY_DSN
        value: https://2b26f073abb42cbd3d0ad97e42c11348@o4511719666876416.ingest.us.sentry.io/4511719760592896

  - type: web
    name: iluminarias-analytics
    runtime: docker
    plan: free
    dockerfilePath: ./backend/analytics/Dockerfile
    dockerContext: ./backend
